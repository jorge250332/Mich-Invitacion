<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación ⚾</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* TEXTOS */
#instruccion, #mensaje, #festejo {
    position: absolute;
    width: 100%;
    text-align: center;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    display: none;
}

#instruccion {
    top: 35%;
    font-size: 34px;
}

#mensaje {
    top: 30%;
    font-size: 36px;
}

#festejo {
    top: 40%;
    font-size: 40px;
}

/* BOTONES */
#opciones {
    position: absolute;
    top: 55%;
    width: 100%;
    text-align: center;
    display: none; /* ✅ CLAVE: oculto desde el inicio */
}

button {
    font-size: 20px;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    margin: 10px;
    background: #ffcc00;
}

button:hover {
    background: #ffd84d;
}

/* BOTÓN NO */
#btnNo {
    position: absolute;
}
</style>
</head>

<body>

<div id="instruccion">🎯 Intenta golpear la bola</div>

<div id="mensaje">⚾ ¡Gol perfecto! ¿Vemos el partido juntos?</div>

<div id="opciones">
    <button onclick="aceptar()">🎉 ¡Sí!</button>
    <button id="btnNo">❌ No</button>
</div>

<div id="festejo">
    🎉 ¡Sabía que dirías que sí! 🎉
    <br><br>
    <button onclick="reiniciar()">🔄 Reiniciar</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* IMÁGENES */
const monkeyImg = new Image();
monkeyImg.src = "mono.png";

const bgImg = new Image();
bgImg.src = "Fondo.png";

/* MONO */
let monkey = {
    x: canvas.width / 2,
    y: canvas.height - 180,
    size: 120,
    swing: 0,
    swinging: false
};

/* PELOTA */
let ball = {
    x: Math.random() * canvas.width,
    y: -50,
    radius: 12,
    speedY: 6,
    hit: false,
    active: false
};

/* CONTROLES */
document.addEventListener("mousemove", e => {
    monkey.x = e.clientX - monkey.size / 2;
});

/* DIBUJOS */
function drawBackground() {
    ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
}

function drawMonkey() {
    const x = monkey.x, y = monkey.y, s = monkey.size;
    ctx.drawImage(monkeyImg, x, y, s, s);

    ctx.save();
    ctx.translate(x + s*0.65, y + s*0.7);

    if (monkey.swinging) {
        monkey.swing += 0.15;
        if (monkey.swing > 1.2) monkey.swinging = false;
    } else {
        monkey.swing *= 0.8;
    }

    ctx.rotate(-0.5 + Math.sin(monkey.swing) * 1.2);

    ctx.strokeStyle = "#5a381f";
    ctx.lineWidth = 12;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(50,-30);
    ctx.stroke();

    ctx.strokeStyle = "#f5deb3";
    ctx.lineWidth = 8;
    ctx.beginPath();
    ctx.moveTo(50,-30);
    ctx.lineTo(110,-70);
    ctx.stroke();

    ctx.restore();
}

function drawBall() {
    if (!ball.active) return;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
}

function collision() {
    return (
        ball.y + ball.radius > monkey.y &&
        ball.x > monkey.x &&
        ball.x < monkey.x + monkey.size
    );
}

/* LOOP */
function update() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBackground();
    drawMonkey();
    drawBall();

    if (ball.active && !ball.hit) ball.y += ball.speedY;

    if (ball.active && !ball.hit && collision()) {
        monkey.swinging = true;
        ball.hit = true;
        document.getElementById("mensaje").style.display = "block";
        document.getElementById("opciones").style.display = "block";
    }

    requestAnimationFrame(update);
}

/* INICIO */
function iniciarJuego() {
    document.getElementById("instruccion").style.display = "block";
    setTimeout(() => {
        document.getElementById("instruccion").style.display = "none";
        ball.active = true;
    }, 5000);
}

/* BOTÓN SÍ */
function aceptar() {
    document.getElementById("mensaje").style.display = "none";
    document.getElementById("opciones").style.display = "none";
    document.getElementById("festejo").style.display = "block";
}

/* BOTÓN NO SE ESCAPA */
const btnNo = document.getElementById("btnNo");
btnNo.addEventListener("mouseenter", () => {
    btnNo.style.left = Math.random() * (window.innerWidth - 100) + "px";
    btnNo.style.top = Math.random() * (window.innerHeight - 60) + "px";
});

/* REINICIAR */
function reiniciar() {
    ball.x = Math.random() * canvas.width;
    ball.y = -50;
    ball.hit = false;
    ball.active = false;
    document.getElementById("festejo").style.display = "none";
    iniciarJuego();
}

update();
iniciarJuego();
</script>

</body>
</html>
