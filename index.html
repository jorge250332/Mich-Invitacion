<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Mich ⚾</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
}

/* INSTRUCCIONES */
#intro {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    font-size: 22px;
    z-index: 10;
}

/* MENSAJE FINAL */
#mensaje {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    font-size: 40px;
    color: white;
    display: none;
    z-index: 5;
}

/* BOTONES */
#restartBtn, #siBtn, #noBtn {
    position: absolute;
    padding: 12px 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    z-index: 5;
}

#restartBtn {
    top: 15px;
    right: 15px;
    background: white;
}

#siBtn {
    bottom: 80px;
    left: 30%;
    background: #4CAF50;
    color: white;
}

#noBtn {
    bottom: 80px;
    right: 30%;
    background: #f44336;
    color: white;
}

/* CONFETI */
.confetti {
    position: absolute;
    width: 8px;
    height: 8px;
    background: red;
    top: 0;
    animation: fall 3s linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(100vh) rotate(360deg);
        opacity: 0;
    }
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
    ⚾ Instrucciones:<br><br>
    1. Espera 5 segundos ⏳<br>
    2. Mueve el mono con el dedo o mouse 🐒<br>
    3. Golpea la pelota ⚾<br>
    4. Elige si quieres ir con Mich 💖<br><br>
    Preparando juego...
</div>

<div id="mensaje">💖✨ Mich dijo que SÍ 😏</div>

<button id="restartBtn">🔄 Reiniciar</button>
<button id="siBtn">💖 SÍ</button>
<button id="noBtn">❌ NO</button>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* IMÁGENES */
const monkeyImg = new Image();
monkeyImg.src = "mono.png";

const bgImg = new Image();
bgImg.src = "fondo.jpg";

/* MONO */
let monkey = {
    x: canvas.width/2,
    y: canvas.height-180,
    size: 120,
    swing: 0,
    swinging: false
};

/* PELOTA */
let ball = {
    x: 100,
    y: -50,
    radius: 12,
    speedY: 6,
    speedX: 0,
    active: false,
    hit: false
};

/* INTRO + DELAY */
setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    ball.active = true;
},5000);

/* CONTROLES */
document.addEventListener("mousemove", e=>{
    monkey.x = e.clientX - monkey.size/2;
});

document.addEventListener("touchmove", e=>{
    let t = e.touches[0];
    monkey.x = t.clientX - monkey.size/2;
});

/* DIBUJO */
function drawBG(){
    ctx.drawImage(bgImg,0,0,canvas.width,canvas.height);
}

function drawMonkey(){
    let x=monkey.x,y=monkey.y,s=monkey.size;

    ctx.drawImage(monkeyImg,x,y,s,s);

    ctx.save();
    ctx.translate(x+s*0.65,y+s*0.55);

    if(monkey.swinging){
        monkey.swing += 0.15;
        if(monkey.swing>1.2) monkey.swinging=false;
    } else {
        monkey.swing *= 0.8;
    }

    let angle=-0.6+Math.sin(monkey.swing)*1.2;
    ctx.rotate(angle);

    ctx.strokeStyle="#5a381f";
    ctx.lineWidth=10;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(50,-30);
    ctx.stroke();

    ctx.strokeStyle="#f5deb3";
    ctx.lineWidth=6;
    ctx.beginPath();
    ctx.moveTo(50,-30);
    ctx.lineTo(110,-70);
    ctx.stroke();

    ctx.restore();
}

function drawBall(){
    ctx.beginPath();
    ctx.arc(ball.x,ball.y,ball.radius,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
}

/* COLISIÓN */
function collision(){
    return (
        ball.y > monkey.y &&
        ball.x > monkey.x &&
        ball.x < monkey.x + monkey.size
    );
}

/* LOOP */
function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    drawBG();
    drawMonkey();
    drawBall();

    if(ball.active){
        if(!ball.hit){
            ball.y += ball.speedY;
        } else {
            ball.y -= 10;
            ball.x += ball.speedX;
        }
    }

    if(collision() && !ball.hit){
        ball.hit=true;
        monkey.swinging=true;
        ball.speedX=(Math.random()-0.5)*10;
    }

    if(ball.y>canvas.height){
        resetBall();
    }

    requestAnimationFrame(loop);
}

/* RESET */
function resetBall(){
    ball.x=100;
    ball.y=-50;
    ball.hit=false;
    ball.speedX=0;
}

/* RESTART */
document.getElementById("restartBtn").onclick=()=>{
    resetBall();
    document.getElementById("mensaje").style.display="none";
};

/* SÍ + CONFETI */
document.getElementById("siBtn").onclick=()=>{
    document.getElementById("mensaje").style.display="block";
    launchConfetti();
};

/* NO HUYE */
const noBtn=document.getElementById("noBtn");
noBtn.addEventListener("mouseover",moveNo);
noBtn.addEventListener("touchstart",moveNo);

function moveNo(){
    noBtn.style.top=Math.random()*80+"%";
    noBtn.style.left=Math.random()*80+"%";
}

/* CONFETI */
function launchConfetti(){
    for(let i=0;i<80;i++){
        let c=document.createElement("div");
        c.classList.add("confetti");
        document.body.appendChild(c);

        c.style.left=Math.random()*100+"vw";
        c.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;

        setTimeout(()=>c.remove(),3000);
    }
}

loop();
</script>

</body>
</html>
