<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Invitación ⚾</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background-color: #000;
}

#instruccion, #mensaje, #festejo {
    position: absolute;
    width: 100%;
    text-align: center;
    font-size: 36px;
    color: white;
    text-shadow: 0 0 20px rgba(0,0,0,0.8);
    display: none;
    z-index: 10;
}

#instruccion { top: 38%; }
#mensaje { top: 30%; }

#opciones {
    position: absolute;
    top: 55%;
    width: 100%;
    text-align: center;
    display: none;
    z-index: 10;
}

button {
    font-size: 20px;
    padding: 12px 24px;
    border-radius: 12px;
    border: none;
    background: #ffd200;
    cursor: pointer;
    margin: 10px;
    touch-action: manipulation;
}

#btnNo {
    position: absolute;
}

#festejo { top: 40%; }
</style>
</head>

<body>

<div id="instruccion">¡Atrápala con el guante!</div>
<div id="mensaje">⚾ ¡Atrapada increíble mich! ¿Quieres ir al partido juntos?</div>

<div id="opciones">
    <button onclick="aceptar()"> ¡Sí!</button>
    <button id="btnNo"> No</button>
</div>

<div id="festejo">
    ¡Sabía que dirías que sí! manda un screnshoot de esto jaja 
    <br><br>
    <button onclick="reiniciar()">🔄 Reiniciar</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

/* IMÁGENES */
const monkeyImg = new Image();
monkeyImg.src = "mono.png";
const bgImg = new Image();
bgImg.src = "Fondo.png";

let juegoActivo = false;

/* MONO */
let monkey = {
    x: canvas.width / 2,
    y: canvas.height - 180,
    size: 120,
    swing: 0,
    swinging: false
};

/* PELOTA */
let ball = {
    x: Math.random() * canvas.width,
    y: -100,
    radius: 12,
    speedY: 6,
    speedX: 0,
    hit: false
};

/* CONTROLES */
document.addEventListener("mousemove", e => {
    monkey.x = e.clientX - monkey.size / 2;
});

document.addEventListener("touchmove", e => {
    if(e.touches.length == 1) {
        e.preventDefault();
        monkey.x = e.touches[0].clientX - monkey.size / 2;
    }
}, { passive: false });

function drawBackground() {
    if (bgImg.complete) {
        ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
    } else {
        ctx.fillStyle = "#2e7d32";
        ctx.fillRect(0,0,canvas.width,canvas.height);
    }
}

/* DIBUJO DEL GUANTE (Reemplaza al bate) */
function drawGlove(x, y, angle) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.scale(0.6, 0.6)

    // Color cuero
    ctx.fillStyle = "#8B4513"; 
    ctx.strokeStyle = "#5D2E0C";
    ctx.lineWidth = 3;

    // Palma del guante
    ctx.beginPath();
    ctx.ellipse(0, 0, 35, 40, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Dedos del guante
    for(let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.ellipse(i * 12, -25, 10, 25, i * 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
    }

    // Cordones/Red
    ctx.beginPath();
    ctx.strokeStyle = "#D2B48C";
    ctx.lineWidth = 2;
    ctx.moveTo(-25, -15);
    ctx.lineTo(25, -15);
    ctx.moveTo(-20, -5);
    ctx.lineTo(20, -5);
    ctx.stroke();

    ctx.restore();
}

function drawMonkey() {
    const x = monkey.x;
    const y = monkey.y;
    const s = monkey.size;

    if (monkeyImg.complete) {
        ctx.drawImage(monkeyImg, x, y, s, s);
    }

    // Animación de movimiento
    if (monkey.swinging) {
        monkey.swing += 0.15;
        if (monkey.swing > 1.2) monkey.swinging = false;
    } else {
        monkey.swing *= 0.85;
    }

    const angle = 0.3 + Math.sin(monkey.swing) * 0.8;
    
    // Dibujamos el guante en la posición de la mano derecha del mono
    drawGlove(x + s * 0.77, y + s * 0.6, angle)
}

function drawBall() {
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.strokeStyle = "#ccc";
    ctx.stroke();
}

function collision() {
    // Ajustado para la posición del nuevo guante
    return (
        ball.y + ball.radius > monkey.y &&
        ball.y < monkey.y + monkey.size * 0.8 &&
        ball.x > monkey.x + monkey.size * 0.5 &&
        ball.x < monkey.x + monkey.size * 1.0
    );
}

function hitEffect() {
    ctx.fillStyle = "rgba(255,255,255,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

function update() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    drawBackground();
    drawMonkey();

    if (juegoActivo) {
        drawBall();

        if (!ball.hit) {
            ball.y += ball.speedY;
        } else {
            ball.y += ball.speedY;
            ball.x += ball.speedX;
            ball.speedY += 0.35;
            hitEffect();
        }

        if (collision() && !ball.hit) {
            monkey.swinging = true;
            ball.hit = true;
            ball.speedY = -12;
            // Mantenemos tu efecto de rebote lateral original
            ball.speedX = (ball.x - (monkey.x + monkey.size * 0.75)) * 0.3;

            mensaje.style.display = "block";
            opciones.style.display = "block";
            juegoActivo = false; 
        }

        if (!ball.hit && ball.y > canvas.height) {
            resetBall();
        }
    }

    requestAnimationFrame(update);
}

function resetBall() {
    ball.x = Math.random() * (canvas.width - 60) + 30;
    ball.y = -50;
    ball.hit = false;
    ball.speedX = 0;
    ball.speedY = 6; 
}

function iniciarJuego() {
    juegoActivo = false;
    instruccion.style.display = "block";
    mensaje.style.display = "none";
    opciones.style.display = "none";
    festejo.style.display = "none";
    resetBall();
    
    setTimeout(() => {
        instruccion.style.display = "none";
        juegoActivo = true;
    }, 5000);
}

function aceptar() {
    mensaje.style.display = "none";
    opciones.style.display = "none";
    festejo.style.display = "block";
    juegoActivo = false;
}

const btnNo = document.getElementById("btnNo");
function moverNo() {
    const maxX = window.innerWidth - 120;
    const maxY = window.innerHeight - 50;
    btnNo.style.left = Math.random() * maxX + "px";
    btnNo.style.top  = Math.random() * maxY + "px";
}
btnNo.addEventListener("mouseenter", moverNo);
btnNo.addEventListener("touchstart", (e) => {
    e.preventDefault();
    moverNo();
});

function reiniciar() {
    iniciarJuego();
}

update();
iniciarJuego();
</script>

</body>
</html>
